name: Ascension-Beta
description: "!!!DO NOT RUN THIS VERSION WITH THE STABLE BUILD ENABLED!!! DISABLE STABLE BUILD FIRST!!! 
This is the beta version of Ascension. Always take a snapshot of your database just to be safe. While the goal is to maintain as stable a build as possible, you may encounter bugs. Please use the discourse thread used in the link button to report"
version: 1.1.1B3
url: https://discourse.stashapp.cc/t/ascension/6714
exec:
  - python
  - "{pluginDir}/jumper-beta.py"

ui: 
  javascript:
    - ascension-beta.js
    - ascen-stats-beta.js
  css:
    - ascension-beta.css
interface: raw

tasks:
  - name: "Prime Performer Ratings"
    description: Randomly assigns all performers a rating between 1 (F-Tier) up to 40 (C-Tier) honoring correct distribution.
    defaultArgs:
      mode: processAll
      task: prime

  - name: "Wipe Performer Match History"
    description: Deletes all Performer Acension history from custom fields. 
    defaultArgs:
      mode: processAll
      task: wipe

  - name: "Reset All Performer Ratings"
    description: Resets all Performer ratings to 0. 
    defaultArgs:
      mode: processAll
      task: reset

  - name: "Snapshot"
    description: Writes all performer ratings, match history, and ledger to a json file. Example- DATE-TIME - Ascension Database Snapshot.json
    defaultArgs:
      mode: processAll
      task: snapshotexport
      
  - name: "Import Ascension Snapshot"
    description: Looks for for most recent snapshot and restores database.
    defaultArgs:
      mode: processAll
      task: snapshotimport

settings:
  showBattleRankBadge:
    displayName: Show Battle Rank Badge
    description: Show a rank badge on individual performer pages. Enabled by default.
    type: BOOLEAN
    
